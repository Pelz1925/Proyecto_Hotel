<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="links">
        <a href="index.html" class="links">Inicio</a>
        <a href="reserva.html" class="links">Reserva</a>
        <a href="contacto.html" class="links">Contacto</a>
        <a href="habitaciones.html" class="links">Habitaciones</a>
    </div>

    <br>

    <div id="picture">
        <img src="imghotel.jpg" alt="hotel" class="pic">
    </div>

    <div class="budget">

        <h2 class="text1">Conoce nuestras tarifas</h2>

        <section class="query">

            <div class="label">
                <label for="start">Fecha de ingreso</label>
                <input type="date" name="start" id="insert">
            </div>
            
            <div class="label">
                <label for="end">Fecha de salida</label>
                <input type="date" name="end" id="insert">
            </div>

            <div class="label">
                <label for="room">Tipo de habitacion</label>
                <select name="room" id="insert">
                    <option value="1">Habitación sencilla</option>
                    <option value="2">Habitación doble</option>
                    <option value="3">Habitación triple</option>
                </select>
            </div>
            
            <div class="label">
                <label for="query">Cotizar</label>
               <button name="query" id="insert"></button>
            </div>
            
        </section>
    </div>
    <footer>
        <p>Hotel - Todos los derechos reservados</p>
    </footer>
</body>
</html>
